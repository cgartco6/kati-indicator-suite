exchange:
  name: binance
  api_key: ${BINANCE_API_KEY}
  secret_key: ${BINANCE_SECRET_KEY}
  testnet: true

trading:
  symbol: BTC/USDT
  timeframe: 15m
  max_positions: 3

indicators:
  ema:
    fast: 20
    slow: 50
  rsi:
    period: 14
    oversold: 30
    overbought: 70
  macd:
    fast: 12
    slow: 26
    signal: 9
  atr:
    period: 14
    multiplier: 2.0
  bollinger:
    period: 20
    std_dev: 2.0
  stochastic:
    k_period: 14
    d_period: 3

risk:
  max_position_size_usdt: 500.0
  max_daily_loss_usdt: 200.0
  stop_loss_atr_multiplier: 1.5
  take_profit_ratio: 2.0

signal_filter:
  min_confluence: 3
  volatility_threshold: 0.02
  min_volume_ratio: 1.5

telegram:
  bot_token: ${TELEGRAM_BOT_TOKEN}
  chat_id: ${TELEGRAM_CHAT_ID}
  signal_cooldown_minutes: 5

backtest:
  initial_capital: 10000.0
  commission: 0.001
  slippage: 0.0005
